spring.application.name=OrderService
spring.datasource.url=jdbc:mysql://shared-db:3306/productdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1981
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.threads.virtual.enabled=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=order-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=org.example.*

grpc.client.productService.address=dns:///product-service:9090
grpc.client.userSeqrvice.negotiation-type=plaintext

spring.data.redis.host=redis-server
spring.data.redis.port=6379